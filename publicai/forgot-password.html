<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | ZWIMA AI</title>
  <meta name="description" content="Reset your ZWIMA AI account password.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html" aria-label="ZWIMA AI home"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"><span class="sr-only">Toggle navigation</span><span></span><span></span><span></span></button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a class="nav-cta" href="contact.html">Request Access</a>
      </div>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a class="logo auth-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <h1>Forgot Password</h1>
      <p class="auth-note" style="margin-top:0;margin-bottom:8px;">Enter your email and we will send a reset link.</p>
      <form class="auth-form" id="forgotForm">
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
        <p class="auth-error" id="forgotError" hidden></p>
        <p class="auth-success" id="forgotSuccess" hidden></p>
        <button class="button button-primary auth-submit" type="submit">Send Reset Link</button>
      </form>
      <div class="auth-links">
        <a href="login.html">Back to sign in</a>
      </div>
      <hr class="auth-divider">
      <h2 class="auth-subtitle">Reset with mock code</h2>
      <p class="auth-note" style="margin-top:0;">Use code <strong>000000</strong> after requesting a reset link.</p>
      <form class="auth-form" id="resetForm">
        <label for="resetEmail">Email</label>
        <input id="resetEmail" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
        <label for="resetCode">Reset Code</label>
        <input id="resetCode" name="code" type="text" placeholder="000000" inputmode="numeric" required>
        <label for="resetPassword">New Password</label>
        <input id="resetPassword" name="password" type="password" placeholder="New password" minlength="6" required>
        <p class="auth-error" id="resetError" hidden></p>
        <p class="auth-success" id="resetSuccess" hidden></p>
        <button class="button button-primary auth-submit" type="submit">Update Password</button>
      </form>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/dbMode.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="utils/constants.js"></script>
  <script src="utils/storage.js"></script>
  <script src="auth/jwtManager.js"></script>
  <script src="services/userStore.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="auth-pages.js"></script>
  <script src="script.js"></script>
</body>
</html>
