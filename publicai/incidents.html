<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident History | ZWIMA AI</title>
  <link rel="stylesheet" href="styles.css">

<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"><span class="sr-only">Toggle navigation</span><span></span><span></span><span></span></button>

  <main class="section">
    <div class="container narrow">
      <div class="section-heading">
        <p class="eyebrow">Operations</p>
        <h1>Incident History</h1>
        <p id="incidentSummary" class="muted">Loading incidents…</p>
