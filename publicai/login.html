<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | ZWIMA AI</title>
  <meta name="description" content="Sign in to the ZWIMA AI platform console.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html" aria-label="ZWIMA AI home"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"><span class="sr-only">Toggle navigation</span><span></span><span></span><span></span></button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a class="nav-cta" href="contact.html">Request Access</a>
      </div>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a class="logo auth-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <h1>Sign in to ZWIMA AI</h1>
      <form class="auth-form" id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
        <label style="display:flex;gap:8px;align-items:center;margin-top:6px;">
          <input id="rememberMe" name="rememberMe" type="checkbox">
          <span>Remember me</span>
        </label>
        <p class="auth-error" id="loginError" hidden></p>
        <button class="button button-primary auth-submit" type="submit">Sign in</button>
      </form>
      <div class="auth-links">
        <a href="forgot-password.html">Forgot password</a>
        <a href="signup.html">Create account</a>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/dbMode.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="services/db/supabaseCredits.js"></script>
  <script src="services/db/supabaseUsage.js"></script>
  <script src="services/db/supabaseApiKeys.js"></script>
  <script src="services/conversationService.js"></script>
  <script src="services/bootstrap-data.js"></script>
  <script src="utils/constants.js"></script>
  <script src="utils/storage.js"></script>
  <script src="auth/jwtManager.js"></script>
  <script src="services/userStore.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="auth-pages.js"></script>
  <script src="script.js"></script>
</body>
</html>
