<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | ZWIMA AI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body" data-page="notifications">
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="dashboardSidebar" aria-label="Dashboard navigation">
      <a class="sidebar-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">Overview</a>
        <a href="profile.html" class="sidebar-link">Profile</a>
        <a href="notifications.html" class="sidebar-link active" aria-current="page">Notifications <span id="notifBadge" class="status-pill active">0</span></a>
      </nav>
      <div class="sidebar-footer"><a href="index.html" class="sidebar-back">← Back to website</a></div>
    </aside>
    <div class="dashboard-main-wrap">
      <header class="dashboard-topbar"><div class="topbar-heading"><h1>Notification Center</h1><p>System, billing, credit, provider and security notices.</p></div></header>
      <main class="dashboard-content">
        <section class="dash-section">
          <div class="dash-section-header">
            <h2>Recent Notifications</h2>
            <button class="button button-secondary" id="markAllReadBtn" type="button">Mark all read</button>
          </div>
          <div class="data-table-wrap">
            <table class="data-table">
              <thead><tr><th>Time</th><th>Category</th><th>Title</th><th>Message</th><th>Status</th></tr></thead>
              <tbody id="notificationsBody"><tr><td colspan="5" class="muted">No notifications.</td></tr></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="dashboard.js"></script>
  <script src="notifications.js"></script>
</body>
</html>
