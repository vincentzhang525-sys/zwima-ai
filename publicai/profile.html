<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | ZWIMA AI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body" data-page="profile">
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="dashboardSidebar" aria-label="Dashboard navigation">
      <a class="sidebar-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">Overview</a>
        <a href="profile.html" class="sidebar-link active" aria-current="page">Profile</a>
        <a href="notifications.html" class="sidebar-link">Notifications</a>
      </nav>
      <div class="sidebar-footer"><a href="index.html" class="sidebar-back">← Back to website</a></div>
    </aside>
    <div class="dashboard-main-wrap">
      <header class="dashboard-topbar"><div class="topbar-heading"><h1>Profile</h1><p>Account and security settings.</p></div></header>
      <main class="dashboard-content">
        <section class="dash-section">
          <div class="overview-grid">
            <article class="overview-card"><span>Avatar</span><strong><img id="profileAvatar" alt="avatar" style="width:48px;height:48px;border-radius:50%;"></strong></article>
            <article class="overview-card"><span>Company</span><strong id="profileCompany">—</strong></article>
            <article class="overview-card"><span>Email</span><strong id="profileEmail">—</strong></article>
            <article class="overview-card"><span>Country</span><strong id="profileCountry">—</strong></article>
            <article class="overview-card"><span>Language</span><strong id="profileLanguage">—</strong></article>
            <article class="overview-card"><span>Timezone</span><strong id="profileTimezone">—</strong></article>
            <article class="overview-card"><span>API Usage Summary</span><strong id="profileUsageSummary">—</strong></article>
            <article class="overview-card"><span>Account Created</span><strong id="profileCreated">—</strong></article>
            <article class="overview-card"><span>Last Login</span><strong id="profileLastLogin">—</strong></article>
          </div>
        </section>
        <section class="dash-section">
          <div class="dash-section-header"><h2>Security</h2></div>
          <div class="composer-actions">
            <button class="button button-secondary" type="button" id="changePasswordBtn">Change Password</button>
            <button class="button button-secondary" type="button">Enable 2FA (Coming soon)</button>
            <button class="button button-secondary" type="button">Delete Account (Coming soon)</button>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
</body>
</html>
