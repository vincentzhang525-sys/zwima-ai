<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings | ZWIMA AI</title>
  <meta name="description" content="Manage your ZWIMA AI account profile and security settings.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body" data-page="settings">
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="dashboardSidebar" aria-label="Dashboard navigation">
      <a class="sidebar-logo" href="index.html">
        <span class="logo-mark">Z</span>
        <span>ZWIMA AI</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html#overview" class="sidebar-link">Overview</a>
        <a href="models.html" class="sidebar-link">Models</a>
        <a href="apikeys.html" class="sidebar-link">API Keys</a>
        <a href="playground.html" class="sidebar-link">Playground</a>
        <a href="routing.html" class="sidebar-link">Intelligent Routing</a>
        <a href="gateway.html" class="sidebar-link">API Gateway</a>
        <a href="credits.html" class="sidebar-link">Credits</a>
        <a href="usage.html" class="sidebar-link">Usage</a>
        <a href="dashboard.html#billing" class="sidebar-link">Billing</a>
        <a href="settings.html" class="sidebar-link active" aria-current="page">Settings</a>
        <a href="documentation.html" class="sidebar-link">Documentation</a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-back">← Back to website</a>
      </div>
    </aside>

    <div class="dashboard-main-wrap">
      <header class="dashboard-topbar">
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-expanded="false" aria-controls="dashboardSidebar">
          <span class="sr-only">Toggle sidebar</span>
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-heading">
          <h1>Account Settings</h1>
          <p>Manage your profile and account details.</p>
        </div>
        <div class="topbar-user" id="topbarUserPanel"></div>
      </header>

      <main class="dashboard-content">
        <section class="dash-section">
          <div class="dash-section-header">
            <h2>Profile</h2>
          </div>
          <form class="settings-form" id="settingsForm">
            <div class="settings-grid">
              <label for="settingsEmail">Email</label>
              <input id="settingsEmail" name="email" type="email" readonly>

              <label for="settingsCompany">Company</label>
              <input id="settingsCompany" name="company" type="text" required>

              <label for="settingsCountry">Country</label>
              <input id="settingsCountry" name="country" type="text" required>

              <label for="settingsRole">Role</label>
              <input id="settingsRole" name="role" type="text" readonly>

              <label for="settingsStatus">Status</label>
              <input id="settingsStatus" name="status" type="text" readonly>

              <label for="settingsPlan">Plan</label>
              <input id="settingsPlan" name="plan" type="text" readonly>
            </div>
            <p class="auth-error" id="settingsError" hidden></p>
            <p class="auth-success" id="settingsSuccess" hidden></p>
            <div class="settings-actions">
              <button class="button button-primary" type="submit">Save Changes</button>
              <button class="button button-secondary" type="button" id="settingsLogoutBtn">Logout</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/dbMode.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="services/db/supabaseCredits.js"></script>
  <script src="services/db/supabaseUsage.js"></script>
  <script src="services/db/supabaseApiKeys.js"></script>
  <script src="services/conversationService.js"></script>
  <script src="services/bootstrap-data.js"></script>
  <script src="auth/permissionManager.js"></script>
  <script src="utils/constants.js"></script>
  <script src="utils/storage.js"></script>
  <script src="utils/format.js"></script>
  <script src="auth/jwtManager.js"></script>
  <script src="services/userStore.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="auth/authGuard.js"></script>
  <script src="services/userService.js"></script>
  <script src="layouts/sidebar.js"></script>
  <script src="layouts/header.js"></script>
  <script src="platform.js"></script>
  <script src="settings.js"></script>
</body>
</html>
