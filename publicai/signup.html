<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | ZWIMA AI</title>
  <meta name="description" content="Create your ZWIMA AI platform account.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html" aria-label="ZWIMA AI home"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"><span class="sr-only">Toggle navigation</span><span></span><span></span><span></span></button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a class="nav-cta" href="contact.html">Request Access</a>
      </div>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a class="logo auth-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <h1>Create your account</h1>
      <form class="auth-form" id="signupForm">
        <label for="signupCompany">Company Name</label>
        <input id="signupCompany" name="company" type="text" placeholder="Your company" required>
        <label for="signupEmail">Company Email</label>
        <input id="signupEmail" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
        <label for="signupPassword">Password</label>
        <input id="signupPassword" name="password" type="password" placeholder="Create a password" autocomplete="new-password" minlength="6" required>
        <label for="signupCountry">Country</label>
        <input id="signupCountry" name="country" type="text" placeholder="Germany" value="Germany" required>
        <input type="hidden" name="role" value="customer">
        <p class="auth-error" id="signupError" hidden></p>
        <p class="auth-success" id="signupSuccess" hidden></p>
        <button class="button button-primary auth-submit" type="submit">Create Account</button>
      </form>
      <div class="auth-links">
        <a href="login.html">Already have an account? Sign in</a>
      </div>
      <p class="auth-note">For early access customers and partners.</p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/dbMode.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="utils/constants.js"></script>
  <script src="utils/storage.js"></script>
  <script src="auth/jwtManager.js"></script>
  <script src="services/userStore.js"></script>
  <script src="services/auth/localStorageAuthAdapter.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="auth-pages.js"></script>
  <script src="script.js"></script>
</body>
</html>
