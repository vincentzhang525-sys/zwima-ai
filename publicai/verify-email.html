<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | ZWIMA AI</title>
  <meta name="description" content="Verify your ZWIMA AI account email address.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html" aria-label="ZWIMA AI home"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"><span class="sr-only">Toggle navigation</span><span></span><span></span><span></span></button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a class="nav-cta" href="signup.html">Create account</a>
      </div>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a class="logo auth-logo" href="index.html"><span class="logo-mark">Z</span><span>ZWIMA AI</span></a>
      <h1>Verify your email</h1>
      <p class="auth-note" style="margin-top:0;">Enter the 6-digit code sent to <strong id="pendingEmail">your email</strong>.</p>
      <form class="auth-form" id="verifyForm">
        <input type="hidden" id="verifyEmail" name="email">
        <label for="verifyCode">Verification Code</label>
        <input id="verifyCode" name="code" type="text" maxlength="6" placeholder="6-digit code" inputmode="numeric" required>
        <p class="auth-error" id="verifyError" hidden></p>
        <p class="auth-success" id="verifySuccess" hidden></p>
        <button class="button button-primary auth-submit" type="submit">Verify Email</button>
      </form>
      <div class="auth-links">
        <a href="login.html">Back to sign in</a>
        <button type="button" class="button button-secondary" id="resendVerifyBtn" style="margin-top:8px;">Resend code</button>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="config.runtime.js"></script>
  <script src="services/db/dbMode.js"></script>
  <script src="services/db/supabaseApi.js"></script>
  <script src="services/auth/supabaseAuthAdapter.js"></script>
  <script src="utils/constants.js"></script>
  <script src="utils/storage.js"></script>
  <script src="auth/jwtManager.js"></script>
  <script src="services/authService.js"></script>
  <script src="auth/authState.js"></script>
  <script src="auth-pages.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const email = params.get("email") || sessionStorage.getItem("zwima_pending_email") || "";
      const pendingEmail = document.getElementById("pendingEmail");
      const verifyEmail = document.getElementById("verifyEmail");
      if (email && pendingEmail) pendingEmail.textContent = email;
      if (email && verifyEmail) verifyEmail.value = email;
      document.getElementById("resendVerifyBtn")?.addEventListener("click", async () => {
        if (!email) return;
        try {
          await window.ZwimaSupabaseAuthAdapter.resendVerification(email);
          alert("Verification code sent.");
        } catch (e) {
          alert(e.message || "Could not resend code.");
        }
      });
    });
  </script>
</body>
</html>
