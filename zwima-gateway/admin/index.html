<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zwima Gateway Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Zwima Gateway</h1>
      <p>Admin Panel V0.1</p>
      <label>Admin Secret</label>
      <input type="password" id="adminSecret" placeholder="ADMIN_SECRET">
      <button id="loginBtn">Anmelden</button>
      <p class="login-hint">Or login as admin user via JWT (is_admin)</p>
      <hr>
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="admin@zwima.local">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="Password">
      <button id="jwtLoginBtn" class="btn-secondary">Login with JWT</button>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <header class="topbar">
      <strong>Zwima Gateway Admin</strong>
      <div class="stats" id="statsBar"></div>
      <button id="logoutBtn" class="btn-sm">Logout</button>
    </header>
    <nav class="tabs">
      <button class="tab active" data-tab="users">Users</button>
      <button class="tab" data-tab="keys">API Keys</button>
      <button class="tab" data-tab="usage">Usage</button>
      <button class="tab" data-tab="billing">Billing</button>
    </nav>
    <main class="content">
      <section id="tab-users" class="tab-panel active">
        <h2>Users</h2>
        <div class="table-wrap"><table id="usersTable"><thead><tr>
          <th>Company</th><th>Email</th><th>Status</th><th>Credits</th><th>Quota</th><th>Keys</th><th>Actions</th>
        </tr></thead><tbody></tbody></table></div>
      </section>
      <section id="tab-keys" class="tab-panel">
        <h2>API Keys</h2>
        <div class="table-wrap"><table id="keysTable"><thead><tr>
          <th>Company</th><th>Name</th><th>Prefix</th><th>Env</th><th>Status</th><th>Last Used</th>
        </tr></thead><tbody></tbody></table></div>
      </section>
      <section id="tab-usage" class="tab-panel">
        <h2>Usage Records</h2>
        <div class="table-wrap"><table id="usageTable"><thead><tr>
          <th>Time</th><th>Company</th><th>Model</th><th>In</th><th>Out</th><th>Credits</th><th>Status</th>
        </tr></thead><tbody></tbody></table></div>
      </section>
      <section id="tab-billing" class="tab-panel">
        <h2>Billing Records</h2>
        <div class="table-wrap"><table id="billingTable"><thead><tr>
          <th>Invoice</th><th>Company</th><th>Type</th><th>Amount</th><th>Period</th><th>Status</th>
        </tr></thead><tbody></tbody></table></div>
      </section>
    </main>
  </div>
  <script src="admin.js"></script>
</body>
</html>
